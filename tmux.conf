# Use Ctrl-a as the tmux prefix and keep Ctrl-b available for shell use.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Faster key handling, especially with Vim and escape sequences.
set -sg escape-time 0

# Keep repeatable binds responsive.
set -g repeat-time 500

# Start window and pane numbering at 1 for easier navigation.
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Make pane splitting and movement faster.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -n C-w if-shell -F '#{||:#{==:#{pane_current_command},vim},#{==:#{pane_current_command},nvim}}' 'send-keys C-w' 'select-pane -t :.+' 
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Terminal and interaction defaults.
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features ",*:RGB"
set-option -g mouse on
set-option -g history-limit 100000
set-option -g set-clipboard on
set-option -g focus-events on
setw -g mode-keys vi

# Make scrollback exit predictable: Enter returns to the live pane.
bind -T copy-mode-vi Enter send -X cancel
bind -T copy-mode Enter send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe "pbcopy"

# Keep the status line compact.
set-option -g status-position bottom
set-option -g status-left-length 30
set-option -g status-right-length 60
set-option -g status-left "#S "
set-option -g status-right "%Y-%m-%d %H:%M "
